<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Despre sat — Lasău</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <div class="page-banner">
    <div class="container">
      <h1 data-i18n="about_title"></h1>
      <p data-i18n="about_intro"></p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="photo-slot photo-slot-empty" id="about-photo">
        <span data-i18n="about_photo_placeholder"></span>
      </div>

      <div class="info-block">
        <h2 data-i18n="about_facts_heading"></h2>
        <p data-i18n="about_fact_county"></p>
        <p data-i18n="about_fact_commune"></p>
        <p class="empty-state" data-i18n="about_fact_note"></p>
      </div>

      <div class="info-block">
        <h2 data-i18n="about_directions_heading"></h2>
        <p class="empty-state" data-i18n="about_directions_text"></p>
      </div>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="assets/js/translations.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/settings.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      applyAboutImage(await fetchSettings());
    });
  </script>
</body>
</html>

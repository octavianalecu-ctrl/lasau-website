<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Despre sat — Lasău</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <div class="page-banner">
    <div class="container">
      <h1 data-field="title"></h1>
      <p data-field="intro"></p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="photo-slot photo-slot-empty" id="about-photo">
        <span data-i18n="about_photo_placeholder"></span>
      </div>

      <div class="info-block">
        <h2 data-field="facts_heading"></h2>
        <div data-field="facts_text" data-rich="1"></div>
      </div>

      <div class="info-block">
        <h2 data-field="directions_heading"></h2>
        <div data-field="directions_text" data-rich="1"></div>
      </div>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="assets/js/translations.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/content.js"></script>
  <script>
    async function initAbout() {
      const about = await fetchPageContent("content/pages/about.json");
      applyPhotoSlot("#about-photo", about, "image");
      const render = () => applyFieldsIn(document, about);
      render();
      document.addEventListener("langchange", render);
    }
    document.addEventListener("DOMContentLoaded", initAbout);
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Administrare site Lasău</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <!-- Decap CMS: gives non-technical editors a browser form for adding
       news and history posts. The form writes back to content/news/news.json
       and content/history/history.json via git. See README.md for setup. -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>

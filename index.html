<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lasău — sat, județul Hunedoara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <section class="hero">
    <div class="container">
      <h1 data-i18n="hero_title"></h1>
      <p data-i18n="hero_subtitle"></p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-heading">
        <h2 data-i18n="home_news_heading"></h2>
        <a href="news.html" data-i18n="see_all"></a>
      </div>
      <div class="card-grid" id="home-news-list"></div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-heading">
        <h2 data-i18n="home_history_heading"></h2>
        <a href="history.html" data-i18n="see_all"></a>
      </div>
      <div class="card-grid" id="home-history-list"></div>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="assets/js/translations.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/posts.js"></script>
  <script src="assets/js/settings.js"></script>
  <script>
    async function initHome() {
      const newsList = document.getElementById("home-news-list");
      const historyList = document.getElementById("home-history-list");
      const [newsPosts, historyPosts, settings] = await Promise.all([
        fetchPosts("content/news/news.json"),
        fetchPosts("content/history/history.json"),
        fetchSettings(),
      ]);
      applyHeroImage(settings);
      const render = () => {
        renderPostCards(newsList, newsPosts, { basePage: "news.html", limit: 2 });
        renderPostCards(historyList, historyPosts, { basePage: "history.html", limit: 2 });
      };
      render();
      document.addEventListener("langchange", render);
    }
    document.addEventListener("DOMContentLoaded", initHome);
  </script>
</body>
</html>

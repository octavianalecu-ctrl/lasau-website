<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lasău — sat, județul Hunedoara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script>
    /* Netlify Identity emails (invite/confirm/recover) link to the site
       root with a token in the URL hash. Only /admin/ has the Identity
       widget loaded to process it, so forward the token there. */
    if (/invite_token|confirmation_token|recovery_token|access_token/.test(window.location.hash)) {
      window.location.replace("/admin/" + window.location.hash);
    }
  </script>
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <section class="hero">
    <div class="container">
      <h1 data-field="hero_title"></h1>
      <p data-field="hero_subtitle"></p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-heading">
        <h2 data-field="news_heading"></h2>
        <a href="news.html" data-i18n="see_all"></a>
      </div>
      <div class="card-grid" id="home-news-list"></div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="section-heading">
        <h2 data-field="history_heading"></h2>
        <a href="history.html" data-i18n="see_all"></a>
      </div>
      <div class="card-grid" id="home-history-list"></div>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="assets/js/translations.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/posts.js"></script>
  <script src="assets/js/content.js"></script>
  <script>
    async function initHome() {
      const newsList = document.getElementById("home-news-list");
      const historyList = document.getElementById("home-history-list");
      const [newsPosts, historyPosts, home] = await Promise.all([
        fetchPosts("content/news/news.json"),
        fetchPosts("content/history/history.json"),
        fetchPageContent("content/pages/home.json"),
      ]);
      applyHeroImage(home);
      const render = () => {
        applyFieldsIn(document, home);
        renderPostCards(newsList, pickFeatured(newsPosts, home.featured_news), { basePage: "news.html" });
        renderPostCards(historyList, pickFeatured(historyPosts, home.featured_history), { basePage: "history.html" });
      };
      render();
      document.addEventListener("langchange", render);
    }
    document.addEventListener("DOMContentLoaded", initHome);
  </script>
</body>
</html>

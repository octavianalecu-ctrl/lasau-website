<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Știri — Lasău</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header" id="site-header"></header>

  <div class="page-banner">
    <div class="container">
      <h1 data-field="page_title"></h1>
      <p data-field="page_intro"></p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div id="news-detail"></div>
      <div id="news-list-wrap">
        <div class="card-grid" id="news-list"></div>
      </div>
    </div>
  </section>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="assets/js/translations.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/posts.js"></script>
  <script src="assets/js/content.js"></script>
  <script>
    async function initNews() {
      const detailEl = document.getElementById("news-detail");
      const listWrap = document.getElementById("news-list-wrap");
      const listEl = document.getElementById("news-list");
      const banner = document.querySelector(".page-banner .container");
      const [posts, pageData] = await Promise.all([
        fetchPosts("content/news/news.json"),
        fetchPageContent("content/news/news.json"),
      ]);

      const render = () => {
        applyFieldsIn(banner, pageData);
        const showedDetail = renderPostDetail(detailEl, posts, { listPage: "news.html" });
        if (showedDetail) {
          listWrap.style.display = "none";
          detailEl.style.display = "block";
        } else {
          listWrap.style.display = "block";
          detailEl.style.display = "none";
          renderPostCards(listEl, posts, { basePage: "news.html" });
        }
      };
      render();
      document.addEventListener("langchange", render);
    }
    document.addEventListener("DOMContentLoaded", initNews);
  </script>
</body>
</html>
